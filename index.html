<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special For You</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #030008;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        /* Efek Kabut Nebula Kosmik Belakang */
        .nebula {
            position: absolute;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 30% 40%, rgba(255, 0, 128, 0.18) 0%, transparent 50%),
                radial-gradient(circle at 70% 60%, rgba(130, 0, 255, 0.22) 0%, transparent 60%);
            z-index: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="nebula"></div>
    <canvas id="heartCanvas"></canvas>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // 1. MEMBUAT BINTANG GALAKSI BERGERAK
        const stars = [];
        const numStars = 150;
        for (let i = 0; i < numStars; i++) {
            stars.push({
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight,
                size: Math.random() * 2,
                alpha: Math.random(),
                speed: 0.005 + Math.random() * 0.015
            });
        }

        // ==========================================
        // SILAKAN UBAH TEKS DI BAWAH INI SESUKAMU:
        // ==========================================
        const textToLoop = "  I LOVE YOU  "; 
        
        let animationOffset = 0;

        // Rumus Matematis Kurva Hati
        function getHeartPoint(t, scale) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
            return { x: x * scale, y: -y * scale };
        }

        function draw() {
            // Memberikan efek trail/jejak cahaya pudar pada pergerakan teks
            ctx.fillStyle = 'rgba(3, 0, 8, 0.25)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Render Bintang Latar Belakang
            for (let i = 0; i < numStars; i++) {
                let s = stars[i];
                s.alpha += s.speed;
                if (s.alpha > 1 || s.alpha < 0) s.speed = -s.speed;
                ctx.fillStyle = `rgba(255, 255, 255, ${Math.abs(s.alpha)})`;
                ctx.fillRect(s.x, s.y, s.size, s.size);
            }

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const baseScale = Math.min(canvas.width, canvas.height) * 0.016;

            // Efek Glow Neon Merah Muda/Magenta
            ctx.shadowBlur = 18;
            ctx.shadowColor = '#ff007f';

            // 2. RENDERING TEKS MEMBENTUK STRUKTUR HATI BERLAPIS
            // Total ada 6 lapisan pusaran dari dalam ke luar
            for (let layer = 1; layer <= 6; layer++) {
                const scale = baseScale * (layer * 0.24);
                // Semakin luar lapisannya, teksnya semakin rapat
                const density = 30 + (layer * 15); 

                for (let i = 0; i < density; i++) {
                    // Sudut t dikombinasikan dengan arah putaran yang berbeda tiap lapisannya
                    const direction = layer % 2 === 0 ? 1 : -1;
                    const t = (i / density) * Math.PI * 2 + (animationOffset * direction * (0.15 * layer));
                    
                    const pos = getHeartPoint(t, scale);
                    const x = centerX + pos.x;
                    const y = centerY + pos.y;

                    // Gradasi warna dari pink muda (dalam) ke magenta pekat (luar)
                    const opacity = 0.25 + (layer * 0.12);
                    ctx.fillStyle = `rgba(255, 120, 210, ${opacity})`;
                    
                    // Ukuran teks dinamis sesuai lapisan
                    ctx.font = `bold ${Math.floor(baseScale * 0.5 + layer * 1.8)}px 'Courier New'`;
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";

                    // Mengambil urutan huruf dari teks pembentuk secara berjalan
                    const charIndex = Math.floor((i + Math.floor(animationOffset * 25)) % textToLoop.length);
                    const letter = textToLoop[charIndex];

                    // Orientasi rotasi teks mengikuti lengkungan bentuk hati
                    ctx.save();
                    ctx.translate(x, y);
                    ctx.rotate(t + Math.PI / 2);
                    ctx.fillText(letter, 0, 0);
                    ctx.restore();
                }
            }

            ctx.shadowBlur = 0; // Reset efek glow
            animationOffset += 0.006; // Kecepatan perputaran animasi

            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>

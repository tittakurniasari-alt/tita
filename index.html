<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untukmu</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #030008; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        .nebula { position: absolute; width: 100%; height: 100%; background: radial-gradient(circle at 30% 30%, rgba(255, 0, 128, 0.2) 0%, transparent 60%), radial-gradient(circle at 75% 70%, rgba(130, 0, 255, 0.22) 0%, transparent 60%); z-index: 0; pointer-events: none; }
    </style>
</head>
<body>
    <div class="nebula"></div>
    <canvas id="heartCanvas"></canvas>
    <script>
        const canvas = document.getElementById('heartCanvas'); const ctx = canvas.getContext('2d');
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();
        const stars = []; const numStars = 150;
        for (let i = 0; i < numStars; i++) { stars.push({ x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight, size: Math.random() * 2, alpha: Math.random(), speed: 0.005 + Math.random() * 0.015 }); }
        const phrases = ["HARI KASIH SAYANG ", "SELAMAT HARI VALENTINE ", "I LOVE YOU ", "SAYANG KAMU "];
        let animationOffset = 0;
        function getHeartPoint(t, scale) { const x = 16 * Math.pow(Math.sin(t), 3); const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t); return { x: x * scale, y: -y * scale }; }
        function draw() {
            ctx.fillStyle = 'rgba(3, 0, 8, 0.25)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < numStars; i++) { let s = stars[i]; s.alpha += s.speed; if (s.alpha > 1 || s.alpha < 0) s.speed = -s.speed; ctx.fillStyle = `rgba(255, 255, 255, ${Math.abs(s.alpha)})`; ctx.fillRect(s.x, s.y, s.size, s.size); }
            const centerX = canvas.width / 2; const centerY = canvas.height / 2; const baseScale = Math.min(canvas.width, canvas.height) * 0.015;
            ctx.shadowBlur = 18; ctx.shadowColor = '#ff007f';
            for (let layer = 1; layer <= 15; layer++) {
                const scale = baseScale * (layer * 0.12); const phrase = phrases[(layer - 1) % phrases.length]; const density = 40 + (layer * 8);
                for (let i = 0; i < density; i++) {
                    const direction = layer % 2 === 0 ? 1 : -1; const t = (i / density) * Math.PI * 2 + (animationOffset * direction * (0.12 * (16 - layer))); const pos = getHeartPoint(t, scale); const x = centerX + pos.x; const y = centerY + pos.y; const opacity = 0.3 + (layer * 0.05); ctx.fillStyle = `rgba(255, 100, 200, ${Math.min(opacity, 1)})`; ctx.font = `bold ${Math.floor(baseScale * 0.4 + layer * 0.8)}px 'Courier New'`; ctx.textAlign = "center"; ctx.textBaseline = "middle"; const charIndex = Math.floor((i + Math.floor(animationOffset * 30)) % phrase.length); const letter = phrase[charIndex]; ctx.save(); ctx.translate(x, y); ctx.rotate(t + Math.PI / 2); ctx.fillText(letter, 0, 0); ctx.restore();
                }
            }
            ctx.shadowBlur = 0; animationOffset += 0.004; requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>

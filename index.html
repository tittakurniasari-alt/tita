<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animasi Hati Kosmik - I Love You</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>

    <canvas id="cosmicCanvas"></canvas>

    <script>
        const canvas = document.getElementById('cosmicCanvas');
        const ctx = canvas.getContext('2d');

        // Mengatur ukuran canvas penuh layar
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // --- KONFIGURASI DAN OBJEK ---

        // 1. Membuat Efek Nebula di Latar Belakang
        function drawNebula() {
            // Gradasi warna ungu, merah muda, biru tua
            let gradient = ctx.createRadialGradient(
                canvas.width / 2, canvas.height / 2, 10,
                canvas.width / 2, canvas.height / 2, Math.max(canvas.width, canvas.height) * 0.6
            );
            gradient.addColorStop(0, 'rgba(40, 0, 50, 0.4)');
            gradient.addColorStop(0.3, 'rgba(120, 0, 90, 0.15)');
            gradient.addColorStop(0.6, 'rgba(20, 0, 60, 0.2)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 1)');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // 2. Partikel Bintang (Background Stars)
        const stars = [];
        const numStars = 150;

        for (let i = 0; i < numStars; i++) {
            stars.push({
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight,
                size: Math.random() * 1.5 + 0.5,
                // Kecepatan kedipan bintang
                twinkleSpeed: Math.random() * 0.05 + 0.01,
                phase: Math.random() * Math.PI * 2
            });
        }

        function drawStars() {
            for (let star of stars) {
                star.phase += star.twinkleSpeed;
                // Efek kedip menggunakan fungsi Math.sin
                let alpha = 0.3 + Math.abs(Math.sin(star.phase)) * 0.7;
                
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();

                // Kadang-kadang menggambar kilauan silang pada bintang yang lebih besar
                if (star.size > 1.8 && Math.sin(star.phase) > 0.8) {
                    ctx.strokeStyle = `rgba(200, 150, 255, ${alpha * 0.5})`;
                    ctx.lineWidth = 0.5;
                    ctx.beginPath();
                    ctx.moveTo(star.x - 4, star.y); ctx.lineTo(star.x + 4, star.y);
                    ctx.moveTo(star.x, star.y - 4); ctx.lineTo(star.x, star.y + 4);
                    ctx.stroke();
                }
            }
        }

        // 3. Teks Hati Bergerak (Heart Text Particles)
        const textParticles = [];
        const textContent = "I love you";
        
        // Persamaan matematika bentuk hati (Heart Curve)
        function getHeartPoint(t) {
            // t berjalan dari 0 sampai 2*PI
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
            return { x: x, y: -y }; // dibalik (-) agar bagian atas hati menghadap ke atas
        }

        // Menghasilkan titik-titik untuk membentuk susunan hati berlayer
        const totalLayers = 6;
        const particlesPerLayer = 35;

        for (let j = 0; j < totalLayers; j++) {
            // Setiap layer memiliki skala ukuran berbeda untuk efek tebal/3D
            const scale = 13 + (j * 2.2); 
            
            for (let i = 0; i < particlesPerLayer; i++) {
                const t = (i / particlesPerLayer) * Math.PI * 2;
                const point = getHeartPoint(t);

                textParticles.push({
                    // Posisi relatif dasar bentuk hati
                    relX: point.x * scale,
                    relY: point.y * scale,
                    // Sudut rotasi teks mengikuti lekukan hati
                    angle: t + Math.PI / 2, 
                    // Kecepatan gerakan mengalir/ombak individual
                    waveOffset: Math.random() * Math.PI * 2,
                    waveSpeed: 0.03 + Math.random() * 0.02,
                    // Ukuran font acak tipis
                    fontSize: Math.floor(Math.random() * 3) + 11,
                    // Kilau warna merah muda / pink neon
                    glow: Math.random() * 15 + 5
                });
            }
        }

        // --- LOOP ANIMASI UTAMA ---
        let globalTime = 0;

        function animate() {
            globalTime += 0.015;

            // Membersihkan layar dengan warna hitam pekat sebelum menggambar ulang
            ctx.fillStyle = '#0a0010';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Ganti mode gambar agar warna kosmik menyatu dengan indah
            ctx.globalCompositeOperation = 'source-over';
            drawNebula();
            drawStars();

            // Ubah ke mode 'lighter' untuk efek neon menyala/glow pada teks hati
            ctx.globalCompositeOperation = 'screen';

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2 - 20;

            for (let p of textParticles) {
                p.waveOffset += p.waveSpeed;
                
                // Membuat efek detak jantung dan ombak mengalir kecil
                const pulse = 1 + Math.sin(globalTime * 2) * 0.03;
                const waveX = Math.sin(p.waveOffset) * 4;
                const waveY = Math.cos(p.waveOffset) * 4;

                // Hitung posisi akhir di layar
                const finalX = centerX + (p.relX * pulse) + waveX;
                const finalY = centerY + (p.relY * pulse) + waveY;

                ctx.save();
                ctx.translate(finalX, finalY);
                // Membuat orientasi teks miring mengikuti bentuk lengkungan hati
                ctx.rotate(p.angle);

                // Mengatur efek glow pink menyala pada teks
                ctx.shadowBlur = p.glow + Math.sin(globalTime * 3) * 5;
                ctx.shadowColor = 'rgba(255, 50, 150, 0.8)';
                
                // Warna teks gradasi pink muda ke putih neon
                ctx.fillStyle = `rgba(255, 210, 230, ${0.7 + Math.sin(p.waveOffset)*0.3})`;
                ctx.font = `bold ${p.fontSize}px Arial, sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                // Gambar teks "I love you"
                ctx.fillText(textContent, 0, 0);
                ctx.restore();
            }

            requestAnimationFrame(animate);
        }

        // Jalankan animasi pertama kali
        animate();
    </script>
</body>
</html>

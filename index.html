<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untukmu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #05010d;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        /* Lapisan Nebula Belakang */
        .nebula {
            position: absolute;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(255, 0, 128, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(100, 0, 200, 0.2) 0%, transparent 60%);
            z-index: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="nebula"></div>
    <canvas id="heartCanvas"></canvas>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Kumpulan bintang latar belakang
        const stars = [];
        const numStars = 100;
        for (let i = 0; i < numStars; i++) {
            stars.push({
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight,
                size: Math.random() * 1.5,
                alpha: Math.random(),
                speed: 0.01 + Math.random() * 0.02
            });
        }

        // Teks utama untuk membentuk hati
        const phrase = "I love you";
        
        // Parameter animasi spiral
        let offset = 0;

        // Rumus matematika untuk membentuk pola hati (Heart Curve)
        function getHeartPoint(t, scale) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
            return { x: x * scale, y: -y * scale }; // Negatif y karena koordinat canvas terbalik
        }

        function draw() {
            // Efek jejak pudar (Motion Blur) agar mirip cahaya kosmik
            ctx.fillStyle = 'rgba(5, 1, 13, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 1. Gambar Bintang-bintang Kedap-kedip
            for (let i = 0; i < numStars; i++) {
                let s = stars[i];
                s.alpha += s.speed;
                if (s.alpha > 1 || s.alpha < 0) s.speed = -s.speed;
                ctx.fillStyle = `rgba(255, 255, 255, ${Math.abs(s.alpha)})`;
                ctx.fillRect(s.x, s.y, s.size, s.size);
            }

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            // Menentukan ukuran hati responsif berdasarkan ukuran layar
            const baseScale = Math.min(canvas.width, canvas.height) * 0.018;

            // Efek Cahaya Neon (Glow Effect)
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#ff007f';

            // 2. Menggambar Teks Membentuk Pusaran Hati Berlapis
            // Membuat beberapa lapisan lingkaran hati dari dalam ke luar
            for (let layer = 1; layer <= 5; layer++) {
                const scale = baseScale * (layer * 0.25);
                const pointsCount = 40 + (layer * 15); // Jumlah teks per lapisan

                for (let i = 0; i < pointsCount; i++) {
                    // Sudut t berjalan dari 0 sampai 2*PI untuk membentuk satu hati penuh
                    const t = (i / pointsCount) * Math.PI * 2 + offset * (layer * 0.2);
                    const pos = getHeartPoint(t, scale);

                    // Posisi karakter/kata di canvas
                    const targetX = centerX + pos.x;
                    const targetY = centerY + pos.y;

                    // Efek warna gradasi pink cerah hingga keunguan
                    const alpha = 0.3 + (layer * 0.14);
                    ctx.fillStyle = `rgba(255, 100, 200, ${alpha})`;
                    
                    // Ukuran font mengecil di bagian dalam, membesar di luar
                    ctx.font = `${Math.floor(baseScale * 0.6 + layer * 1.5)}px 'Courier New'`;
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";

                    // Ambil potongan huruf atau kata dari frasa secara berulang
                    const charIndex = Math.floor((i + Math.floor(offset * 20)) % phrase.length);
                    const textToDisplay = phrase[charIndex];

                    // Efek rotasi teks mengikuti lekukan jalur hati
                    ctx.save();
                    ctx.translate(targetX, targetY);
                    ctx.rotate(t + Math.PI / 2);
                    ctx.fillText(textToDisplay, 0, 0);
                    ctx.restore();
                }
            }

            // Atur ulang shadow agar tidak merusak performa render berikutnya
            ctx.shadowBlur = 0;

            // Kecepatan animasi perputaran teks
            offset += 0.005;

            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
  </html>
